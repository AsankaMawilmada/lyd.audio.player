<div class="flex flex-col items-center">

</div>
<!-- High-Res Badge -->
<div class="absolute top-md right-md px-sm py-xs bg-surface-dim/60 backdrop-blur-md rounded-full border border-white/10">
<span class="font-label-sm text-label-sm text-secondary">HI-RES</span>
</div>
</div>
<!-- Track Info -->
<div class="w-full max-w-[400px] text-left mb-xl px-xs">

<div class="flex justify-between mt-sm">

<!-- Bottom Navigation Shell (Suppressed as per "Task-Focused" rule for Now Playing sub-page) -->
<script>
        // Micro-interactions
        const favoriteBtn = document.getElementById('favorite-btn');
        favoriteBtn.addEventListener('click', () => {
            const icon = favoriteBtn.querySelector('span');
            const isFilled = icon.style.fontVariationSettings.includes("'FILL' 1");
            icon.style.fontVariationSettings = isFilled ? "'FILL' 0" : "'FILL' 1";
            favoriteBtn.classList.toggle('text-secondary');
        });

        // Simple Progress Simulation
        let progress = 35;
        const progressBar = document.querySelector('.bg-secondary');
        const thumb = document.querySelector('.progress-thumb');
        
        setInterval(() => {
            if (progress < 100) {
                progress += 0.05;
                progressBar.style.width = `${progress}%`;
                thumb.style.left = `${progress}%`;
            }
        }, 1000);
    </script>
